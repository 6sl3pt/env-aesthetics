[[themes]]
name = "osaka-jade"

[themes.palette]
black = "#23372B"
red = "#FF5345"
green = "#549e6a"
yellow = "#459451"
blue = "#509475"
magenta = "#D2689C"
cyan = "#2DD5B7"
white = "#F6F5DD"
bright_black = "#53685B"
bright_red = "#db9f9c"
bright_green = "#63b07a"
bright_yellow = "#E5C736"
bright_blue = "#ACD4CF"
bright_magenta = "#75bbb3"
bright_cyan = "#8CD3CB"
bright_white = "#9eebb3"

[themes.component_style]
block_title = { fg = "Magenta" }
border = { fg = "Blue" }
current_playing = { fg = "Green", modifiers = ["Bold"] }
like = { fg = "Red" }
lyrics_played = { modifiers = ["Dim"] }
lyrics_playing = { fg = "Green", modifiers = ["Bold"] }
page_desc = { fg = "Cyan", modifiers = ["Bold"] }
playback_status = { fg = "Cyan", modifiers = ["Bold"] }
playback_track = { fg = "Cyan", modifiers = ["Bold"] }
playback_artists = { fg = "Cyan", modifiers = ["Bold"] }
playback_album = { fg = "Yellow" }
playback_genres = { fg = "BrightBlack", modifiers = ["Italic"] }
playback_metadata = { fg = "BrightBlack" }
playback_progress_bar = { bg = "Black", fg = "Green" }
playback_progress_bar_unfilled = { bg = "BrightBlack" }
playlist_desc = { fg = "BrightBlack" }
selection = { bg = "#383B35" }
secondary_row = {}
table_header = { fg = "Blue" }
